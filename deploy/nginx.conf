# EOCC reverse proxy — terminates client traffic and applies edge security.
#
# In production, place this behind TLS (terminate HTTPS here or at a load
# balancer) and set the commented HSTS header. The proxy is the single public
# entry point; backend and database are not exposed directly.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    server_tokens off;                 # do not advertise nginx version
    client_max_body_size 12m;          # cap uploads at the edge
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;

    # Basic abuse mitigation at the edge (in addition to app rate limiting).
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

    upstream eocc_backend {
        server backend:8000;
    }
    upstream eocc_frontend {
        server frontend:3000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers applied to every response.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        # Enable in production once TLS is terminated:
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Authentication endpoints get the strictest edge rate limit.
        location /api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://eocc_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API traffic.
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://eocc_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health probe passthrough (no rate limit).
        location = /health {
            proxy_pass http://eocc_backend/health;
        }

        # Everything else → the Next.js frontend.
        location / {
            proxy_pass http://eocc_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
