# Render Blueprint for the EOCC backend (FastAPI) + managed PostgreSQL.
#
# This deploys ONLY the backend API and database. The Next.js frontend is
# expected to be hosted on Vercel; after this deploys, copy the API URL into
# the Vercel project as NEXT_PUBLIC_API_BASE_URL (with the /api/v1 suffix) and
# set BACKEND_CORS_ORIGINS below to your Vercel domain.
#
# Deploy: push this file to GitHub, then in Render -> New -> Blueprint, select
# the repo. Render reads this file and provisions everything.

databases:
  - name: eocc-db
    databaseName: eocc
    user: eocc
    plan: free

services:
  - type: web
    name: eocc-api
    runtime: docker
    repo: https://github.com/arydub-dev/EOCC
    branch: main
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /live
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      # Connection string from the managed Postgres above. The app rewrites the
      # scheme to postgresql+psycopg:// automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: eocc-db
          property: connectionString
      # Auto-generated strong secrets (the app derives a valid Fernet key from
      # ENCRYPTION_KEY, so a random value here is fine).
      - key: SECRET_KEY
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      # Seed demo data + demo accounts so the app is usable immediately.
      - key: SEED_ON_STARTUP
        value: "true"
      # HTTPS + cross-site cookies (frontend on vercel.app, API on onrender.com).
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "none"
      # IMPORTANT: set this to your exact Vercel domain(s), comma-separated,
      # e.g. https://eocc.vercel.app  (no trailing slash).
      - key: BACKEND_CORS_ORIGINS
        sync: false
      # Optional: enable the AI copilot by pasting an OpenAI key (blank = local
      # deterministic fallback engine).
      - key: OPENAI_API_KEY
        sync: false
