name: Feature request
description: Propose an enhancement or new capability
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve EOCC. Please check the [ROADMAP](../blob/main/ROADMAP.md)
        and existing issues first to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What operational problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the capability you'd like and how it should behave.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated and why you discarded them.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Operational modules
        - Decision engines / analytics
        - Integrations / data ingestion
        - Auth / security / governance
        - Deployment / operations
        - Documentation / DX
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, or links that help explain the request.
