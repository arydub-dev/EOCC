name: Bug report
description: Report a defect or unexpected behavior in EOCC
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please do **not** include
        secrets, tokens, or real operational data. For security vulnerabilities,
        use the process in [SECURITY.md](../blob/main/SECURITY.md) instead of a public issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so we can reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages, request IDs, or correlation IDs if available.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Backend (API / engines)
        - Frontend (console / UI)
        - Database / data model
        - Auth / security
        - Deployment / Docker
        - Documentation
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: How are you running EOCC?
      placeholder: |
        - Deployment: docker compose / local dev
        - OS:
        - Browser (if frontend):
        - Version / commit:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Relevant log output or screenshots. Redact sensitive values.
      render: shell
