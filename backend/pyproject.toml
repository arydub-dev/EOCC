[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["__pycache__", ".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "B", "I", "UP", "C4"]
ignore = [
  "E501",  # line length is handled by the formatter
  "B008",  # FastAPI uses callables (Depends/Query) as default arguments
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
